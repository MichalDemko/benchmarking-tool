# Default local config — copy of config-examples/simple-example.yml
# Run: ./benchmarking-tool   (uses this file) or ./benchmarking-tool path/to/config.yml

baseUrls:
  - "http://0.0.0.0:8080"

execution:
  mode: "fixed"
  durationSeconds: 5
  requestTimeoutMs: 2000
  requestsPerSecond: 50

parameterGenerators:
  user_id:
    type: "formattedInt"
    min: 1000
    max: 9999
    format: "user_{}"

  age:
    type: "randomInt"
    min: 18
    max: 65

  status:
    type: "choice"
    values: ["active", "inactive"]
    weights: [0.8, 0.2]

endpoints:
  get_user:
    path: "/api/v1/users/{user_id}"
    method: "GET"
    pathParameters:
      user_id:
        $ref: "user_id"
    queryParameters:
      fields: "id,name,email"

  search_users:
    path: "/api/v1/users/search"
    method: "POST"
    headers:
      Content-Type: "application/json"
    bodyParameters:
      type: "object"
      properties:
        query:
          type: "choice"
          values: ["john", "jane", "admin", "test", "user"]
        filters:
          type: "object"
          properties:
            status:
              $ref: "status"
            minAge:
              $ref: "age"
            maxAge:
              type: "randomInt"
              min: 65
              max: 80
        limit:
          type: "randomInt"
          min: 10
          max: 100

endpointSelection:
  strategy: "weighted"
  weights:
    get_user: 0.6
    search_users: 0.4
